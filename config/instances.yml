# Configuração das instâncias Grafana
#
# Modelo: 1 ambiente = 1 branch (env/<name>).
# - Backups de cada ambiente são commitados no branch env/<name>.
# - Scripts/workflows vivem somente em main.
#
# Cada entrada precisa de um secret no GitHub:
#   GRAFANA_TOKEN_<NAME_UPPER>   (ex: GRAFANA_TOKEN_DEV, GRAFANA_TOKEN_HML, GRAFANA_TOKEN_PRD)
#
# Recomendado: Service Account em cada Grafana com role "Admin"
# (Viewer basta se a instância nunca receberá restore).
# Docs: https://grafana.com/docs/grafana/latest/administration/service-accounts/

instances:
  # DEMO — Grafana rodando em VM Azure
