            echo "- Removidos: ${{ steps.diff.outputs.deleted }}"
          } >> "$GITHUB_STEP_SUMMARY"

  backup-prd:
    if: github.event_name == 'schedule' || contains(fromJSON('["all","prd"]'), github.event.inputs.env)
    runs-on: ${{ vars.RUNNER_PRD_LOW }}
    timeout-minutes: 30
    steps:
      - name: Checkout scripts (ops/grafana-backup)
        uses: actions/checkout@v4
        with:
