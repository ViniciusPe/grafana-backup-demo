name: DEMO - Restore Grafana (lab)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Commit/tag a restaurar (vazio = HEAD)"
        required: false
        default: ""
      folder:
        description: "Apenas uma pasta (vazio = todas)"
        required: false
        default: ""
      uid:
        description: "Apenas um dashboard por uid (vazio = todos)"
        required: false
        default: ""
      prune:
        description: "Remover dashboards que não existem no repo"
        required: false
        type: boolean
        default: false
      dry_run:
        description: "Simular (não escreve no Grafana)"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: grafana-restore-demo
  cancel-in-progress: false

jobs:
  restore:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: grafana-restore-demo
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - run: pip install -r scripts/requirements.txt

      - name: Run restore
        env:
          GRAFANA_TOKEN_LAB: ${{ secrets.GRAFANA_TOKEN_LAB }}
        run: |
          ARGS=(--instance lab --message "Restore demo @ ${{ github.sha }}")
          [ -n "${{ inputs.folder }}" ] && ARGS+=(--folder "${{ inputs.folder }}")
          [ -n "${{ inputs.uid }}"    ] && ARGS+=(--uid    "${{ inputs.uid }}")
          [ "${{ inputs.prune }}"   = "true" ] && ARGS+=(--prune)
          [ "${{ inputs.dry_run }}" = "true" ] && ARGS+=(--dry-run)
          python scripts/restore.py "${ARGS[@]}"

      - if: always()
        run: |
          {
            echo "## Restore demo"
            echo ""
            echo "- Ref: \`${{ inputs.ref || github.ref }}\`"
            echo "- Pasta: \`${{ inputs.folder || '(todas)' }}\`"
            echo "- UID: \`${{ inputs.uid || '(todos)' }}\`"
            echo "- Prune: \`${{ inputs.prune }}\`"
            echo "- Dry-run: \`${{ inputs.dry_run }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
