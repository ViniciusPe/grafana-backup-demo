name: Backup Grafana Dashboards

# Modelo: 1 ambiente = 1 branch (env/<env>).
# Default branch deste repo: ops/grafana-backup (contém scripts + workflows).
# Cada ambiente (dev/hml/prd) roda em seu próprio job com runner corporativo específico.

on:
  schedule:
    - cron: "0 * * * *"  # a cada 1 hora (UTC)
  workflow_dispatch:
    inputs:
      env:
        description: "Qual ambiente fazer backup?"
        required: true
        type: choice
        default: all
        options:
          - all
          - dev
          - hml
          - prd

permissions:
  contents: write

concurrency:
  group: grafana-backup-${{ github.event.inputs.env || 'all' }}
  cancel-in-progress: false

jobs:
  backup-dev:
    if: github.event_name == 'schedule' || contains(fromJSON('["all","dev"]'), github.event.inputs.env)
    runs-on: ${{ vars.RUNNER_DEV_LOW }}
    timeout-minutes: 30
    env:
      ENV_NAME: dev
    steps:
      - name: Checkout scripts (ops/grafana-backup)
        uses: actions/checkout@v4
        with:
          ref: ops/grafana-backup
          path: main

      - name: Checkout data (env/dev)
        uses: actions/checkout@v4
        with:
          ref: env/dev
          path: data
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: main/scripts/requirements.txt

      - name: Install deps
        run: pip install -r main/scripts/requirements.txt

      - name: Run backup (dev)
        working-directory: main
        env:
          GRAFANA_TOKEN_DEV: ${{ secrets.GRAFANA_TOKEN_DEV }}
        run: |
          python scripts/backup.py \
            --instance dev \
            --data-dir "${GITHUB_WORKSPACE}/data/instances"

      - name: Detect changes
        id: diff
        working-directory: data
        run: |
          git add -A instances/
          ADDED=$(git diff --cached --name-status --no-renames -- instances/ | awk '$1=="A"' | wc -l)
          MODIFIED=$(git diff --cached --name-status --no-renames -- instances/ | awk '$1=="M"' | wc -l)
          DELETED=$(git diff --cached --name-status --no-renames -- instances/ | awk '$1=="D"' | wc -l)
          echo "added=$ADDED"       >> "$GITHUB_OUTPUT"
          echo "modified=$MODIFIED" >> "$GITHUB_OUTPUT"
          echo "deleted=$DELETED"   >> "$GITHUB_OUTPUT"
          if git diff --cached --quiet -- instances/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit & push para env/dev
        if: steps.diff.outputs.changed == 'true'
        working-directory: data
        env:
          ADDED: ${{ steps.diff.outputs.added }}
          MODIFIED: ${{ steps.diff.outputs.modified }}
          DELETED: ${{ steps.diff.outputs.deleted }}
        run: |
          git config user.name  "grafana-backup-bot"
          git config user.email "grafana-backup-bot@users.noreply.github.com"
          git commit -m "chore(backup): dev sync (+${ADDED} ~${MODIFIED} -${DELETED})"
          git push origin "HEAD:env/dev"

      - name: Summary
        run: |
          {
            echo "## Backup dev"
            echo ""
            echo "- Novos: ${{ steps.diff.outputs.added }}"
            echo "- Alterados: ${{ steps.diff.outputs.modified }}"
            echo "- Removidos: ${{ steps.diff.outputs.deleted }}"
          } >> "$GITHUB_STEP_SUMMARY"

  backup-hml:
    if: github.event_name == 'schedule' || contains(fromJSON('["all","hml"]'), github.event.inputs.env)
    runs-on: ${{ vars.RUNNER_HOM_LOW }}
    timeout-minutes: 30
    steps:
      - name: Checkout scripts (ops/grafana-backup)
        uses: actions/checkout@v4
        with:
          ref: ops/grafana-backup
